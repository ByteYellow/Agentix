site_name: Agentix
site_description: Typed Python namespaces for sandbox-based agent workflows
site_url: https://agentiix.github.io/Agentix/
repo_url: https://github.com/Agentiix/Agentix
repo_name: Agentiix/Agentix
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    # Light + dark scheme toggle. Material's standard switch.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quick start: quick-start.md
  - Plugin authors guide: plugins.md
  - Reference:
      - Architecture: architecture.md
      - Namespace protocol: namespace-protocol.md
      - CLI: cli.md
  - Development: DEVELOPMENT.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Agentiix/Agentix

copyright: MIT License — Agentix authors
