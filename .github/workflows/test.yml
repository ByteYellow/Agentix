name: test

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff check agentix/ tests/
      - run: pytest tests/ -v

  e2e:
    name: end-to-end (Docker + Nix)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'

      - uses: docker/setup-buildx-action@v3

      # Build each closure image with GitHub Actions cache backend so that
      # unchanged nix-build outputs are reused across runs.
      - name: Build runtime closure
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/closure-docker/Dockerfile
          tags: agentix/runtime:ci
          load: true
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,scope=runtime,mode=max

      - name: Build mock-agent closure
        uses: docker/build-push-action@v6
        with:
          context: tests/closures/mock-agent
          file: tests/closure-docker/Dockerfile
          tags: agentix/mock-agent:ci
          load: true
          cache-from: type=gha,scope=mock-agent
          cache-to: type=gha,scope=mock-agent,mode=max

      - name: Build mock-dataset closure
        uses: docker/build-push-action@v6
        with:
          context: tests/closures/mock-dataset
          file: tests/closure-docker/Dockerfile
          tags: agentix/mock-dataset:ci
          load: true
          cache-from: type=gha,scope=mock-dataset
          cache-to: type=gha,scope=mock-dataset,mode=max

      - name: Smoke test
        run: python tests/smoke_docker.py
        env:
          AGENTIX_RUNTIME_IMAGE: agentix/runtime:ci
          AGENTIX_AGENT_IMAGE: agentix/mock-agent:ci
          AGENTIX_DATASET_IMAGE: agentix/mock-dataset:ci
