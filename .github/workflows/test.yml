name: test

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: lint
        run: ruff check agentix/ tests/
      - name: types
        run: pyright agentix
      - name: unit tests
        run: pytest tests/ -v
